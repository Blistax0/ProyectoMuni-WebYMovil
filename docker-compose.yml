version: '3.8'

services:
  # Contenedor de Base de Datos
  db-sigep:
    image: mysql:8.0
    container_name: mysql_sigep
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sigep123
      MYSQL_DATABASE: sigep_db
    ports:
      - "3306:3306" # Expone el puerto para verlo desde Workbench
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psigep123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Contenedor del Backend
  api-backend:
    build: 
      context: ./backend # Apunta a la carpeta donde está Dockerfile
    container_name: backend_sigep
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db-sigep:
        condition: service_healthy
    environment:
      # Usamos el nombre del servicio
      - DB_HOST=db-sigep 
      - DB_USER=root
      - DB_PASSWORD=sigep123
      - DB_NAME=sigep_db
      - PORT=3000
      - CLOUDINARY_CLOUD_NAME=dgbe3ukar
      - CLOUDINARY_API_KEY=766596764588812
      - CLOUDINARY_API_SECRET=rWmZnkTS6er3FEjhGlszMPXjBFE
      - JWT_SECRET=super_secreto_sigep_2026


  # Frontend 
  web-frontend:
    build:
      context: ./frontend
    container_name: frontend_sigep
    restart: always
    ports:
      - "8080:80" 
    depends_on:
      - api-backend # El frontend espera a que el backend esté listo
